<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réconciliation 2025-2026</title>
<style>
  /* ---- LIGHT THEME (default) ---- */
  :root {
    --bg: #f1f5f9; --surface: #ffffff; --surface2: #e2e8f0;
    --border: #cbd5e1; --text: #1e293b; --muted: #64748b;
    --accent: #2563eb; --green: #16a34a; --yellow: #ca8a04; --red: #dc2626;
    --green-bg: rgba(22,163,74,.10); --yellow-bg: rgba(202,138,4,.10); --red-bg: rgba(220,38,38,.10);
    --blue-bg: rgba(37,99,235,.10);
    --header-grad: linear-gradient(135deg,#2563eb,#1e40af);
  }
  /* ---- DARK / PRO THEME ---- */
  body.dark {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --border: #475569; --text: #e2e8f0; --muted: #94a3b8;
    --accent: #3b82f6; --green: #22c55e; --yellow: #eab308; --red: #ef4444;
    --green-bg: rgba(34,197,94,.12); --yellow-bg: rgba(234,179,8,.12); --red-bg: rgba(239,68,68,.12);
    --blue-bg: rgba(59,130,246,.12);
    --header-grad: linear-gradient(135deg,#1e3a5f,#0f172a);
  }
  /* ---- BINGA MODE ANIMATION ---- */
  .binga-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
  .binga-overlay.show{animation:bingaFade 1.8s ease forwards}
  .binga-overlay .binga-bg{position:absolute;inset:0;background:radial-gradient(circle,rgba(59,130,246,.25),rgba(15,23,42,.95));backdrop-filter:blur(6px)}
  .binga-overlay .binga-text{position:relative;font-size:2.4rem;font-weight:900;letter-spacing:.15em;color:#3b82f6;text-shadow:0 0 40px rgba(59,130,246,.6),0 0 80px rgba(59,130,246,.3);text-transform:uppercase}
  .binga-overlay .binga-line{position:absolute;left:50%;transform:translateX(-50%);height:2px;background:linear-gradient(90deg,transparent,#3b82f6,transparent);animation:bingaLine .8s ease .3s forwards;width:0}
  .binga-overlay .binga-line.top{top:-14px} .binga-overlay .binga-line.bot{bottom:-14px}
  @keyframes bingaFade{0%{opacity:0}12%{opacity:1}75%{opacity:1}100%{opacity:0}}
  @keyframes bingaLine{to{width:260px}}
  body *{transition:background-color .5s ease,color .3s ease,border-color .4s ease}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .header{background:var(--header-grad);border-bottom:1px solid var(--border);padding:20px 32px}
  .header h1{font-size:1.4rem;font-weight:700;color:#fff} .header p{color:rgba(255,255,255,.7);font-size:.82rem;margin-top:3px}
  .tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);padding:0 32px;flex-wrap:wrap}
  .tab{padding:12px 20px;cursor:pointer;color:var(--muted);font-weight:600;font-size:.82rem;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;user-select:none}
  .tab:hover{color:var(--text);background:var(--surface2)} .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .content{padding:24px 32px;max-width:1400px} .panel{display:none} .panel.active{display:block}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:22px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .card .l{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
  .card .v{font-size:1.2rem;font-weight:700}
  .card .v.green{color:var(--green)} .card .v.yellow{color:var(--yellow)} .card .v.red{color:var(--red)} .card .v.blue{color:var(--accent)}
  .s{margin-bottom:26px}
  .st{font-size:.92rem;font-weight:700;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .st::before{content:'';width:3px;height:16px;background:var(--accent);border-radius:2px}
  table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
  thead th{background:var(--surface2);padding:9px 12px;text-align:left;font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600;white-space:nowrap}
  tbody td{padding:8px 12px;border-top:1px solid var(--border);font-size:.8rem}
  tbody tr:hover{background:rgba(59,130,246,.06)}
  .b{padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:600;display:inline-block;white-space:nowrap}
  .b.ok{background:var(--green-bg);color:var(--green)} .b.w{background:var(--yellow-bg);color:var(--yellow)}
  .b.e{background:var(--red-bg);color:var(--red)} .b.i{background:var(--blue-bg);color:var(--accent)}
  .a{font-variant-numeric:tabular-nums;font-weight:600;text-align:right;white-space:nowrap}
  .n{background:var(--surface);border-left:3px solid var(--yellow);padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;font-size:.78rem;color:var(--muted);line-height:1.5}
  .n.e{border-left-color:var(--red)} .n.ok{border-left-color:var(--green)}
  .tr td{font-weight:700;background:var(--surface2);border-top:2px solid var(--border)}
  .insight{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;border-left:4px solid var(--accent);margin-bottom:12px}
  .insight.pass{border-left-color:var(--green)} .insight.warn{border-left-color:var(--yellow)} .insight.fail{border-left-color:var(--red)}
  .insight strong{color:var(--text)} .insight .t{font-weight:700;font-size:.88rem;margin-bottom:6px} .insight .d{font-size:.8rem;color:var(--muted);line-height:1.5}
  /* Year toggle */
  .year-toggle{display:inline-flex;background:var(--surface2);border-radius:8px;padding:3px;margin-bottom:18px;border:1px solid var(--border)}
  .year-btn{padding:7px 18px;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--muted);transition:all .2s;user-select:none}
  .year-btn:hover{color:var(--text)}
  .year-btn.active{background:var(--accent);color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}
  @media(max-width:768px){.content{padding:14px}.tabs{padding:0 10px}.tab{padding:10px 12px;font-size:.72rem}table{font-size:.72rem}thead th,tbody td{padding:6px 7px}.cards{grid-template-columns:repeat(2,1fr)}}
  /* ---- GATE OVERLAY ---- */
  .gate-overlay{position:fixed;inset:0;z-index:10000;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .6s ease,transform .6s ease}
  .gate-overlay.hide{opacity:0;transform:scale(1.05);pointer-events:none}
  .gate-box{text-align:center;max-width:380px;width:90%}
  .gate-logo{font-size:1.1rem;font-weight:800;letter-spacing:.18em;color:#3b82f6;text-transform:uppercase;margin-bottom:6px;text-shadow:0 0 30px rgba(59,130,246,.3)}
  .gate-sub{font-size:.72rem;color:#64748b;margin-bottom:32px;letter-spacing:.04em}
  .gate-input{width:100%;background:rgba(30,41,59,.8);border:1px solid #334155;border-radius:10px;padding:14px 18px;color:#e2e8f0;font-size:.92rem;font-weight:500;letter-spacing:.12em;text-align:center;outline:none;transition:border-color .3s,box-shadow .3s}
  .gate-input:focus{border-color:#3b82f6;box-shadow:0 0 20px rgba(59,130,246,.15)}
  .gate-input::placeholder{color:#475569;letter-spacing:.06em;font-weight:400}
  .gate-error{color:#ef4444;font-size:.78rem;margin-top:12px;opacity:0;transition:opacity .4s;min-height:20px}
  .gate-error.show{opacity:1}
  .gate-hint{color:#334155;font-size:.62rem;margin-top:28px;letter-spacing:.03em}
  .gate-input.shake{animation:gateShake .6s ease}
  .gate-input.nope{animation:gateNope .8s ease}
  .gate-input.dizzy{animation:gateDizzy 1s ease}
  .gate-input.bounce{animation:gateBounce .7s ease}
  .gate-input.melt{animation:gateMelt .9s ease}
  @keyframes gateShake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-8px)}20%,40%,60%,80%{transform:translateX(8px)}}
  @keyframes gateNope{0%{transform:translateX(0) rotate(0)}15%{transform:translateX(-15px) rotate(-3deg)}30%{transform:translateX(12px) rotate(2deg)}45%{transform:translateX(-9px) rotate(-1.5deg)}60%{transform:translateX(6px) rotate(1deg)}75%{transform:translateX(-3px)}100%{transform:translateX(0) rotate(0)}}
  @keyframes gateDizzy{0%{transform:rotate(0) scale(1)}20%{transform:rotate(5deg) scale(1.02)}40%{transform:rotate(-4deg) scale(.98)}60%{transform:rotate(3deg) scale(1.01)}80%{transform:rotate(-1deg)}100%{transform:rotate(0) scale(1)}}
  @keyframes gateBounce{0%{transform:translateY(0)}20%{transform:translateY(-18px)}40%{transform:translateY(0)}55%{transform:translateY(-10px)}70%{transform:translateY(0)}85%{transform:translateY(-4px)}100%{transform:translateY(0)}}
  @keyframes gateMelt{0%{transform:scaleY(1) scaleX(1);filter:blur(0)}30%{transform:scaleY(.85) scaleX(1.08);filter:blur(1px)}50%{transform:scaleY(1.1) scaleX(.95);filter:blur(0)}70%{transform:scaleY(.97) scaleX(1.02)}100%{transform:scaleY(1) scaleX(1);filter:blur(0)}}
  @keyframes emojiPop{0%{transform:scale(0) rotate(-30deg)}50%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
  .gate-emoji{font-size:2rem;margin-bottom:8px;opacity:0;transition:opacity .3s;min-height:44px;display:flex;align-items:center;justify-content:center}
  .gate-emoji.show{opacity:1;animation:emojiPop .5s ease}
  /* Hide site content until gate is passed */
  .site-wrap{display:none}
  .site-wrap.visible{display:block}
  /* Sortable table headers */
  th[data-sort]{cursor:pointer;user-select:none;white-space:nowrap}
  th[data-sort]:hover{background:rgba(255,255,255,.04)}
  th[data-sort]::after{content:'⇅';opacity:.25;margin-left:4px;font-size:.65em}
  th[data-sort].sort-asc::after{content:'▲';opacity:.7}
  th[data-sort].sort-desc::after{content:'▼';opacity:.7}
  /* ---- HERO CARD (big position card) ---- */
  .hero-card{background:var(--surface);border:2px solid var(--accent);border-radius:14px;padding:24px 28px;margin-bottom:20px;text-align:center}
  .hero-card .hero-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
  .hero-card .hero-value{font-size:2.2rem;font-weight:800;line-height:1.1}
  .hero-card .hero-value.green{color:var(--green)} .hero-card .hero-value.yellow{color:var(--yellow)} .hero-card .hero-value.red{color:var(--red)}
  .hero-card .hero-who{font-size:.88rem;font-weight:600;margin-top:8px}
  .hero-card .hero-detail{font-size:.72rem;color:var(--muted);margin-top:6px}
  /* ---- COLLAPSIBLE SECTIONS ---- */
  .section-toggle{cursor:pointer;user-select:none;display:flex;align-items:center;gap:8px}
  .section-toggle::after{content:'▸';font-size:.7rem;color:var(--muted);transition:transform .2s}
  .section-toggle.open::after{transform:rotate(90deg)}
  .section-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
  .section-body.open{max-height:none}
  /* ---- SUMMARY ROW (compact cards) ---- */
  .summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
  .summary-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
  .summary-item .sl{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .summary-item .sv{font-size:1rem;font-weight:700;margin-top:2px}
  .summary-item .sd{font-size:.62rem;color:var(--muted);margin-top:2px}
  /* ---- UPDATED CARDS (slightly bigger) ---- */
  @media(max-width:768px){.hero-card .hero-value{font-size:1.6rem}.summary-row{grid-template-columns:repeat(2,1fr)}.cards{grid-template-columns:1fr 1fr}}
  @media(max-width:480px){.summary-row{grid-template-columns:1fr}.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<!-- GATE: Access code required -->
<div class="gate-overlay" id="gate">
  <div class="gate-box">
    <div class="gate-emoji" id="gateEmoji"></div>
    <div class="gate-logo">Réconciliation</div>
    <div class="gate-sub">Facturation 2025–2026</div>
    <input class="gate-input" id="gateInput" type="password" placeholder="Code d'accès" autocomplete="off" spellcheck="false">
    <div class="gate-error" id="gateErr"></div>
    <div class="gate-hint">Demandez votre code d'accès à Amine</div>
  </div>
</div>
<!-- Site content (hidden until gate passed) -->
<div class="site-wrap" id="siteWrap">
<div class="header">
  <h1>Réconciliation Facturation 2025–2026</h1>
  <p>Suivi des paiements et positions · Taux de conversion : 10 000 DH = 1 000 €</p>
</div>
<div class="tabs" id="tabBar"></div>
<div class="content" id="content"></div>
<div style="padding:20px 32px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px">
  <span style="font-size:.72rem;color:var(--muted)">Réf. dossier</span>
  <input id="dref" type="text" placeholder="—" autocomplete="off" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:var(--text);font-size:.78rem;width:140px;outline:none">
</div>
<div class="binga-overlay" id="bingaOvl">
  <div class="binga-bg"></div>
  <div style="position:relative;text-align:center">
    <div class="binga-line top"></div>
    <div class="binga-text">Binga Mode</div>
    <div class="binga-line bot"></div>
  </div>
</div>
</div><!-- /site-wrap -->
<script src="data.js?v=39"></script>
<script src="data-priv.enc.js?v=39"></script>
<script src="render-helpers.js?v=39"></script>
<script src="render-augustin.js?v=39"></script>
<script src="render-benoit.js?v=39"></script>
<script src="render-fxp2p.js?v=39"></script>
<script src="render-gains.js?v=39"></script>
<script src="render-main.js?v=39"></script>
<script>
// ---- ACCESS MODE ----
window.ACCESS_MODE = null; // 'full' or 'benoit'

// ---- GATE: BRIDGEVALE / COUPA access codes ----
(function(){
  const gate = document.getElementById('gate');
  const gateInput = document.getElementById('gateInput');
  const gateErr = document.getElementById('gateErr');
  const gateEmoji = document.getElementById('gateEmoji');
  const siteWrap = document.getElementById('siteWrap');
  let attempts = 0;

  const funnyMessages = [
    { msg: "Nope. T'es pas sur la liste VIP.", emoji: "🙅", anim: "shake" },
    { msg: "Mot de passe incorrect... comme ta stratégie.", emoji: "🤔", anim: "nope" },
    { msg: "Raté ! Essaie 1234... non je rigole.", emoji: "😂", anim: "bounce" },
    { msg: "Même mon chat aurait trouvé mieux.", emoji: "🐱", anim: "dizzy" },
    { msg: "Alerte intrusion ! (non je plaisante... ou pas)", emoji: "🚨", anim: "melt" },
    { msg: "C'est pas open bar ici, cousin.", emoji: "🍸", anim: "shake" },
    { msg: "Le serveur a ri. Littéralement.", emoji: "🤣", anim: "bounce" },
    { msg: "Ctrl+Z ta tentative stp.", emoji: "⌨️", anim: "nope" },
    { msg: "T'as demandé à ChatGPT ? Lui non plus sait pas.", emoji: "🤖", anim: "dizzy" },
    { msg: "Indice : c'est pas 'password'.", emoji: "💡", anim: "melt" },
    { msg: "Tu chauffes... non en fait t'es glacé.", emoji: "🥶", anim: "shake" },
    { msg: "La porte est fermée. Frappe plus fort.", emoji: "🚪", anim: "bounce" },
  ];

  const lockdownMessages = [
    { msg: "OK c'est fini. Reviens avec le bon code.", emoji: "🔒" },
    { msg: "5 tentatives... t'es banni du quartier.", emoji: "⛔" },
  ];

  function showGateError(msgObj) {
    gateEmoji.textContent = msgObj.emoji;
    gateEmoji.classList.remove('show');
    void gateEmoji.offsetWidth;
    gateEmoji.classList.add('show');
    gateErr.textContent = msgObj.msg;
    gateErr.classList.add('show');
    if (msgObj.anim) {
      gateInput.classList.remove('shake','nope','dizzy','bounce','melt');
      void gateInput.offsetWidth;
      gateInput.classList.add(msgObj.anim);
    }
    gateInput.style.borderColor = '#ef4444';
    setTimeout(() => {
      gateErr.classList.remove('show');
      gateEmoji.classList.remove('show');
      gateInput.style.borderColor = '';
      gateInput.classList.remove('shake','nope','dizzy','bounce','melt');
    }, 3000);
  }

  gateInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      const v = this.value.trim();
      if(v === 'BRIDGEVALE' || v === 'COUPA'){
        window.ACCESS_MODE = (v === 'COUPA') ? 'benoit' : 'full';
        gate.classList.add('hide');
        setTimeout(()=>{ gate.style.display='none'; }, 700);
        siteWrap.classList.add('visible');

        if(window.ACCESS_MODE === 'benoit'){
          document.getElementById('dref').parentElement.style.display = 'none';
        }
        buildTabs();
        renderAll();
      } else {
        attempts++;
        this.value = '';
        if(attempts >= 5){
          this.disabled = true;
          const ld = lockdownMessages[Math.floor(Math.random() * lockdownMessages.length)];
          gateEmoji.textContent = ld.emoji;
          gateEmoji.classList.add('show');
          gateErr.textContent = ld.msg;
          gateErr.classList.add('show');
          gateInput.style.borderColor = '#ef4444';
        } else {
          const pick = funnyMessages[Math.floor(Math.random() * funnyMessages.length)];
          showGateError(pick);
        }
      }
    }
  });

  // Focus on load
  gateInput.focus();
})();

// ---- Year toggle ----
window.azYear = 2026;
window.baYear = 2026;
function switchAzYear(y){
  window.azYear = y;
  document.getElementById('augustin').innerHTML = y === 0 ? renderAugustinAll() : (y === 2025) ? renderAugustin2025() : renderAugustin2026();
}
function switchBaYear(y){
  window.baYear = y;
  document.getElementById('benoit').innerHTML = y === 0 ? renderBenoitAll() : (y === 2025) ? renderBenoit2025() : renderBenoit2026();
}
window.fxYear = 0;
window.gainsYear = 0;
function switchFxYear(y){
  window.fxYear = y;
  document.getElementById('fxp2p').innerHTML = renderFXP2P();
}
function switchGainsYear(y){
  window.gainsYear = y;
  document.getElementById('gains').innerHTML = renderMesGains();
}

// ---- Crypto: Decrypt private data with Web Crypto API ----
async function decryptPrivData(password) {
  const SALT = 'facturation-augustin-2025';
  const enc = new TextEncoder();

  // Derive key from password using PBKDF2 (same params as Node script)
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
  const derivedBits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt: enc.encode(SALT), iterations: 100000, hash: 'SHA-256' }, keyMaterial, 256);
  const key = await crypto.subtle.importKey('raw', derivedBits, { name: 'AES-GCM' }, false, ['decrypt']);

  // Decode base64
  const raw = Uint8Array.from(atob(ENCRYPTED_PRIV), c => c.charCodeAt(0));
  const iv = raw.slice(0, 12);
  const tag = raw.slice(12, 28);
  const ciphertext = raw.slice(28);

  // AES-GCM expects tag appended to ciphertext
  const combined = new Uint8Array(ciphertext.length + tag.length);
  combined.set(ciphertext);
  combined.set(tag, ciphertext.length);

  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, combined);
  return JSON.parse(new TextDecoder().decode(decrypted));
}

function injectPrivData(priv) {
  // Inject commission rate and taux marché into Benoit 2025
  DATA.benoit2025.commissionRate = priv.benoit2025.commissionRate;
  priv.benoit2025.councilsTaux.forEach((t, i) => {
    if (DATA.benoit2025.councils[i]) {
      DATA.benoit2025.councils[i].tauxMarche = t.tauxMarche;
    }
  });

  // Inject Benoit 2026 private fields
  DATA.benoit2026.tauxApplique = priv.benoit2026.tauxApplique;
  DATA.benoit2026.commissionRate = priv.benoit2026.commissionRate;
  priv.benoit2026.councilsTauxMarche.forEach((t, i) => {
    if (DATA.benoit2026.councils[i]) {
      DATA.benoit2026.councils[i].tauxMarche = t.tauxMarche;
    }
  });

  // Inject full FX P2P data
  DATA.fxP2P = priv.fxP2P;

  // Inject Ycarré commission info
  DATA._ycarreCommission = priv.ycarreCommission;
  DATA._ycarreTotal = priv.ycarreTotal;
}

// ---- Binga (only available in full mode) ----
document.getElementById('dref').addEventListener('input', async function(){
  const v = this.value.trim();
  if(v === 'BINGA' && !window.PRIV && window.ACCESS_MODE === 'full'){
    this.value = '';
    this.placeholder = '...';

    try {
      // Decrypt private data
      const priv = await decryptPrivData('BINGA');
      injectPrivData(priv);

      window.PRIV = true;
      const ovl = document.getElementById('bingaOvl');
      ovl.classList.add('show');
      setTimeout(()=>{ document.body.classList.add('dark'); }, 400);
      setTimeout(()=>{
        refreshTabVisibility();
        renderAll();
        ovl.classList.remove('show');
        this.placeholder = '✓';
      }, 1900);
    } catch(e) {
      console.error('Decryption failed:', e);
      this.placeholder = '✗';
      setTimeout(() => { this.placeholder = 'Réf. dossier'; }, 2000);
    }
  }
});
</script>
</body>
</html>
